<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — Manage Sponsors</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      padding: 16px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .section {
      padding: 14px 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .add-form {
      display: flex;
      gap: 6px;
    }
    .add-form input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    .add-form input::placeholder { color: #475569; }
    .add-form input:focus { border-color: #3b82f6; }
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      font-size: 11px;
      padding: 4px 10px;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.3); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #94a3b8;
      font-size: 11px;
      padding: 6px 12px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.success { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .toast.error { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .toast.show { opacity: 1; }
    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .stat-pill {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-pill .num { font-size: 18px; font-weight: 700; color: #3b82f6; }
    .stat-pill .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .company-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 0 16px 14px;
    }
    .company-list::-webkit-scrollbar { width: 4px; }
    .company-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .company-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      transition: background 0.15s;
    }
    .company-item:hover { background: rgba(255,255,255,0.04); }
    .company-item .name { flex: 1; }
    .company-item .badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 8px;
      font-weight: 500;
    }
    .badge-default {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
    }
    .badge-custom {
      background: rgba(168,85,247,0.15);
      color: #c084fc;
    }
    .search-filter {
      padding: 0 16px 10px;
    }
    .search-filter input {
      width: 100%;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    .search-filter input::placeholder { color: #475569; }
    .search-filter input:focus { border-color: #3b82f6; }
    .tabs {
      display: flex;
      padding: 0 16px;
      gap: 4px;
      margin-bottom: 10px;
    }
    .tab {
      flex: 1;
      padding: 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      color: #64748b;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .tab.active {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border-color: rgba(59,130,246,0.3);
    }
    .tab:hover:not(.active) { background: rgba(255,255,255,0.06); }
    .actions-bar {
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .empty {
      text-align: center;
      padding: 24px;
      color: #475569;
      font-size: 12px;
    }
    .back-link {
      display: inline-block;
      font-size: 11px;
      color: #60a5fa;
      cursor: pointer;
      margin-top: 6px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <div style="font-size:24px; margin-bottom:4px;">⚙️</div>
    <h1>Sponsor Admin Panel</h1>
    <p>Add, remove & manage sponsor companies</p>
  </div>

  <div class="stats-bar">
    <div class="stat-pill">
      <div class="num" id="defaultCount">—</div>
      <div class="lbl">Default</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="customCount">0</div>
      <div class="lbl">Custom</div>
    </div>
    <div class="stat-pill">
      <div class="num" id="totalCount">—</div>
      <div class="lbl">Total</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Add Company</div>
    <div class="add-form">
      <input type="text" id="newCompany" placeholder="e.g. SPOTIFY UK LIMITED">
      <button class="btn btn-primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="all">All</div>
    <div class="tab" data-tab="custom">Custom Only</div>
    <div class="tab" data-tab="default">Default Only</div>
  </div>

  <div class="search-filter">
    <input type="text" id="filterInput" placeholder="Filter companies…">
  </div>

  <div class="company-list" id="companyList"></div>

  <div class="actions-bar">
    <button class="btn btn-secondary" id="exportBtn">📥 Export CSV</button>
    <button class="btn btn-secondary" id="importBtn">📤 Import CSV</button>
    <input type="file" id="importFile" accept=".csv" style="display:none;">
    <button class="btn btn-danger" id="clearCustomBtn">🗑 Clear Custom</button>
  </div>

  <script src="admin.js"></script>
</body>
</html>
