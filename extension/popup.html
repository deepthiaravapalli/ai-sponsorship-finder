<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      padding: 16px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .flag { font-size: 28px; margin-bottom: 6px; }
    .stats {
      padding: 14px 16px;
      display: flex;
      gap: 8px;
    }
    .stat {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-num { font-size: 20px; font-weight: 700; color: #3b82f6; }
    .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .search-box {
      padding: 0 16px 12px;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    .search-box input::placeholder { color: #475569; }
    .search-box input:focus { border-color: #3b82f6; }
    .result {
      padding: 0 16px 14px;
      display: none;
    }
    .result-card {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .result-card.sponsor { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
    .result-card.not_found { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
    .result-name { font-weight: 600; font-size: 13px; }
    .result-status { font-size: 11px; margin-top: 4px; color: #94a3b8; }
    .info {
      padding: 0 16px 14px;
      font-size: 10px;
      color: #475569;
      text-align: center;
    }
    .supported {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 10px;
      color: #475569;
      text-align: center;
    }
    .supported span { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="flag">🇬🇧</div>
    <h1>UK Visa Sponsor Checker</h1>
    <p>Check if a company sponsors UK work visas</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total">—</div>
      <div class="stat-label">Sponsors</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="checked">0</div>
      <div class="stat-label">Checked</div>
    </div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search company name…">
  </div>
  <div class="result" id="result">
    <div class="result-card" id="resultCard">
      <div class="result-name" id="resultName"></div>
      <div class="result-status" id="resultStatus"></div>
    </div>
  </div>
  <div class="info">Visit a job page on LinkedIn, Indeed, or Glassdoor for auto-detection.</div>
  <div class="supported">Works on: <span>LinkedIn · Indeed · Glassdoor</span></div>

  <script src="popup.js"></script>
</body>
</html>
